<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- BeepSketch favicon — pixel bee 8x8 grid @ 4x scale -->
  <!-- black=#404040(64), white=#d8d8d8(216), yellow=#FFD600, bg=transparent -->
  <!-- row 1: col 3,4,5 = yellow -->
  <rect x="12" y="4"  width="4" height="4" fill="#FFD600"/>
  <rect x="16" y="4"  width="4" height="4" fill="#FFD600"/>
  <rect x="20" y="4"  width="4" height="4" fill="#FFD600"/>
  <!-- row 2: col 2=Y, 3=K, 4=Y, 5=K, 6=Y -->
  <rect x="8"  y="8"  width="4" height="4" fill="#FFD600"/>
  <rect x="12" y="8"  width="4" height="4" fill="#404040"/>
  <rect x="16" y="8"  width="4" height="4" fill="#FFD600"/>
  <rect x="20" y="8"  width="4" height="4" fill="#404040"/>
  <rect x="24" y="8"  width="4" height="4" fill="#FFD600"/>
  <!-- row 3: col 2,3,4,5,6 = yellow -->
  <rect x="8"  y="12" width="4" height="4" fill="#FFD600"/>
  <rect x="12" y="12" width="4" height="4" fill="#FFD600"/>
  <rect x="16" y="12" width="4" height="4" fill="#FFD600"/>
  <rect x="20" y="12" width="4" height="4" fill="#FFD600"/>
  <rect x="24" y="12" width="4" height="4" fill="#FFD600"/>
  <!-- row 4: col 1,2=white, 3,4,5=black, 6,7=white -->
  <rect x="4"  y="16" width="4" height="4" fill="#d8d8d8"/>
  <rect x="8"  y="16" width="4" height="4" fill="#d8d8d8"/>
  <rect x="12" y="16" width="4" height="4" fill="#404040"/>
  <rect x="16" y="16" width="4" height="4" fill="#404040"/>
  <rect x="20" y="16" width="4" height="4" fill="#404040"/>
  <rect x="24" y="16" width="4" height="4" fill="#d8d8d8"/>
  <rect x="28" y="16" width="4" height="4" fill="#d8d8d8"/>
  <!-- row 5: col 2=white, 3,4,5=yellow, 6=white -->
  <rect x="8"  y="20" width="4" height="4" fill="#d8d8d8"/>
  <rect x="12" y="20" width="4" height="4" fill="#FFD600"/>
  <rect x="16" y="20" width="4" height="4" fill="#FFD600"/>
  <rect x="20" y="20" width="4" height="4" fill="#FFD600"/>
  <rect x="24" y="20" width="4" height="4" fill="#d8d8d8"/>
  <!-- row 6: col 4,5 = black -->
  <rect x="16" y="24" width="4" height="4" fill="#404040"/>
  <rect x="20" y="24" width="4" height="4" fill="#404040"/>
  <!-- row 7: col 5 = yellow -->
  <rect x="20" y="28" width="4" height="4" fill="#FFD600"/>
</svg>
